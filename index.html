<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behrmannplatz Buszeiten</title>
<style>
body { margin:0; background:#000; color:#FFD700; font-family:Arial,sans-serif; }
.header { padding:20px; font-size:22px; font-weight:bold; text-align:center; border-bottom:1px solid rgba(255,255,255,0.2); }
.card { padding:20px; }
.row { display:flex; justify-content:space-between; padding:14px 0; border-bottom:1px solid rgba(255,255,255,0.1); }
.line { font-size:22px; font-weight:bold; width:60px; }
.direction { flex:1; font-size:18px; }
.time { font-size:22px; text-align:right; }
.delay { font-size:14px; margin-left:6px; }
.late { color:red; }
.medium { color:orange; }
.footer { text-align:center; font-size:12px; opacity:0.5; padding:10px; }
</style>
</head>
<body>

<div class="header">Behrmannplatz</div>
<div class="card" id="list">lade Daten…</div>
<div class="footer" id="status"></div>

<script>
// Feste Stop-ID für Behrmannplatz
const STOP_ID = "900000100201";
// Stabile Proxy-URL
const PROXY = "https://cors.bridged.cc/";

async function load() {
    try {
        // Abfahrten abrufen
        const depRes = await fetch(`${PROXY}https://v6.db.transport.rest/stops/${STOP_ID}/departures?duration=60`);
        const data = await depRes.json();

        const container = document.getElementById("list");
        container.innerHTML = "";
        const now = new Date();

        // Nur Busse, max. 10 Einträge
        data.departures
            .filter(d => d.line.product === "bus")
            .slice(0, 10)
            .forEach(dep => {
                const line = dep.line.name;
                const direction = dep.direction;

                const planned = new Date(dep.plannedWhen);
                const real = new Date(dep.when);
                const delay = Math.round((real - planned)/60000);
                const mins = Math.max(0, Math.round((real - now)/60000));

                let delayHTML = "";
                let delayClass = "";
                if (delay > 0) {
                    delayClass = delay > 4 ? "late" : "medium";
                    delayHTML = `<span class="delay ${delayClass}">(+${delay})</span>`;
                }
                const timeText = mins <= 0 ? "sofort" : mins + " min";

                container.innerHTML += `
                    <div class="row">
                        <div class="line">${line}</div>
                        <div class="direction">${direction}</div>
                        <div class="time">${timeText} ${delayHTML}</div>
                    </div>
                `;
            });

        document.getElementById("status").innerText = "Letztes Update: " + new Date().toLocaleTimeString();

    } catch(e) {
        document.getElementById("list").innerText = "Fehler beim Laden";
        document.getElementById("status").innerText = "";
        console.error(e);
    }
}

// Erst laden + alle 30 Sekunden aktualisieren
load();
setInterval(load, 30000);
</script>
</body>
</html>
